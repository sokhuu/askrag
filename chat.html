<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask a question — California new business compliance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;800&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --route-green:#1E4D3B;
    --route-green-dark:#12332A;
    --paper:#F3F5F1;
    --paper-dim:#E8EBE4;
    --asphalt:#22241D;
    --amber:#E8A33D;
    --amber-dark:#8A5B15;
    --ink-blue:#2C4A6E;
    --white:#FDFDFB;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--asphalt);
    font-family:'Public Sans',sans-serif;
    line-height:1.55;
    display:flex;flex-direction:column;
  }
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;}

  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 32px;max-width:1080px;margin:0 auto;width:100%;
  }
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .shield{
    width:34px;height:38px;background:var(--route-green);
    clip-path:polygon(50% 0%,100% 20%,100% 70%,50% 100%,0% 70%,0% 20%);
    display:flex;align-items:center;justify-content:center;
    color:var(--white);font-family:'Overpass';font-weight:800;font-size:13px;
  }
  .brand-name{font-family:'Overpass',sans-serif;font-weight:800;font-size:19px;color:var(--asphalt);}
  .nav-back{color:var(--asphalt);text-decoration:none;font-size:14px;font-weight:500;}

  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:20px 32px 60px;
  }
  .chat-page-inner{width:100%;max-width:680px;}
  .chat-page-inner h1{
    font-family:'Overpass',sans-serif;font-weight:800;letter-spacing:-0.01em;
    font-size:26px;text-align:center;margin:0 0 8px;
  }
  .chat-page-inner p.sub{
    text-align:center;font-size:14.5px;opacity:0.7;margin:0 0 28px;
  }

  .chat-window{
    background:var(--white);border-radius:8px;overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.12);
    display:flex;flex-direction:column;
  }
  .chat-head{
    background:var(--asphalt);color:var(--white);padding:12px 18px;
    font-family:'IBM Plex Mono';font-size:12px;display:flex;justify-content:space-between;
  }
  .chat-body{
    padding:24px;display:flex;flex-direction:column;gap:16px;color:var(--asphalt);
    min-height:320px;max-height:55vh;overflow-y:auto;
  }
  .bubble-q{
    align-self:flex-end;background:var(--ink-blue);color:var(--white);
    padding:11px 16px;border-radius:10px 10px 2px 10px;font-size:14.5px;max-width:80%;
    white-space:pre-wrap;
  }
  .bubble-a{
    align-self:flex-start;background:var(--paper);border:1px solid var(--paper-dim);
    padding:11px 16px;border-radius:10px 10px 10px 2px;font-size:14.5px;max-width:88%;
    white-space:pre-wrap;
  }
  .chat-input-row{
    border-top:1px solid var(--paper-dim);padding:14px 20px;
    display:flex;gap:10px;background:var(--white);
  }
  .chat-input-row input{
    flex:1;border:1px solid var(--paper-dim);border-radius:4px;
    padding:12px 14px;font-size:14.5px;font-family:'Public Sans';color:var(--asphalt);
  }
  .chat-input-row button{
    background:var(--amber);color:var(--asphalt);border:none;
    padding:0 20px;border-radius:4px;font-weight:600;font-size:14px;
    font-family:'Overpass';cursor:pointer;
  }
  .chat-input-row button:disabled{opacity:0.6;cursor:default;}
  .hero-hint{margin-top:16px;font-size:13px;opacity:0.6;text-align:center;}

  @media (max-width:600px){
    .chat-body{max-height:none;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">
    <div class="shield">CA</div>
    <div class="brand-name">PermitPantry</div>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<main>
  <div class="chat-page-inner">
    <h1>Ask anything about starting a food-related business in California.</h1>
    <p class="sub">Answers are pulled directly from statutes, state froms, and local sources.</p>

    <div class="chat-window">
      <div class="chat-head">
        <span>RAG</span>
        <span>LIVE</span>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Ask about entity types, permits, waste handling…" autofocus>
        <button id="chatBtn">Ask</button>
      </div>
    </div>
    <div class="hero-hint">No sign-up needed to ask a question.</div>
  </div>
</main>

<script>
(function(){
  const chatBody = document.getElementById('chatBody');
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatBtn');
  let chatHistory = [];

  function addBubble(role, text){
    const div = document.createElement('div');
    div.className = role === 'human' ? 'bubble-q' : 'bubble-a';
    div.textContent = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    return div;
  }

  async function send(){
    const question = input.value.trim();
    if(!question || btn.disabled) return;
    input.value = '';
    btn.disabled = true;
    addBubble('human', question);
    const answerBubble = addBubble('ai', 'Thinking…');

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ question, chat_history: chatHistory })
      });
      const data = await res.json();
      if(!res.ok){
        answerBubble.textContent = data.error || 'Something went wrong. Please try again.';
      } else {
        answerBubble.textContent = data.answer;
        chatHistory = data.chat_history;
      }
    } catch (err) {
      answerBubble.textContent = 'Could not reach the server. Please try again.';
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  btn.addEventListener('click', send);
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter') send();
  });
})();
</script>
</body>
</html>
