<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask a question — RuleFinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2A4A;
    --navy-dark:#071B30;
    --blue:#0089C9;
    --blue-dark:#03699C;
    --bg:#F4F6F8;
    --panel:#EAF0F5;
    --border:#D8E1E8;
    --ink:#132436;
    --muted:#57697C;
    --white:#FFFFFF;
    --live:#2E9E5B;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.55;
    display:flex;flex-direction:column;
  }
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;}

  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 32px;max-width:1080px;margin:0 auto;width:100%;
  }
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .mark{
    width:34px;height:34px;background:var(--navy);border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    color:var(--white);font-family:'Inter';font-weight:800;font-size:15px;
  }
  .brand-name{font-family:'Inter',sans-serif;font-weight:800;font-size:19px;color:var(--ink);}
  .nav-back{color:var(--ink);text-decoration:none;font-size:14px;font-weight:500;}

  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:20px 32px 60px;
  }
  .chat-page-inner{width:100%;max-width:680px;}
  .chat-page-inner h1{
    font-family:'Inter',sans-serif;font-weight:800;letter-spacing:-0.01em;
    font-size:26px;text-align:center;margin:0 0 8px;
  }
  .chat-page-inner p.sub{
    text-align:center;font-size:14.5px;color:var(--muted);margin:0 0 28px;
  }

  .chat-window{
    background:var(--white);border-radius:8px;overflow:hidden;
    box-shadow:0 20px 50px rgba(11,42,74,0.12);
    display:flex;flex-direction:column;
  }
  .chat-head{
    background:var(--navy-dark);color:var(--white);padding:12px 18px;
    font-family:'IBM Plex Mono';font-size:12px;display:flex;justify-content:space-between;align-items:center;
  }
  .live-dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--live);margin-right:6px;box-shadow:0 0 6px var(--live);
  }
  .chat-body{
    padding:24px;display:flex;flex-direction:column;gap:16px;color:var(--ink);
    min-height:320px;max-height:55vh;overflow-y:auto;
  }
  .bubble-q{
    align-self:flex-end;background:var(--blue);color:var(--white);
    padding:11px 16px;border-radius:10px 10px 2px 10px;font-size:14.5px;max-width:80%;
    white-space:pre-wrap;
  }
  .bubble-a{
    align-self:flex-start;background:var(--bg);border:1px solid var(--border);
    padding:11px 16px;border-radius:10px 10px 10px 2px;font-size:14.5px;max-width:88%;
    white-space:pre-wrap;
  }
  .chat-input-row{
    border-top:1px solid var(--border);padding:14px 20px;
    display:flex;gap:10px;background:var(--white);
  }
  .chat-input-row input{
    flex:1;border:1px solid var(--border);border-radius:4px;
    padding:12px 14px;font-size:14.5px;font-family:'Inter';color:var(--ink);
  }
  .chat-input-row button{
    background:var(--navy);color:var(--white);border:none;
    padding:0 20px;border-radius:4px;font-weight:600;font-size:14px;
    font-family:'Inter';cursor:pointer;
  }
  .chat-input-row button:disabled{opacity:0.6;cursor:default;}
  .hero-hint{margin-top:16px;font-size:13px;color:var(--muted);text-align:center;}

  @media (max-width:600px){
    .chat-body{max-height:none;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">
    <div class="mark">R</div>
    <div class="brand-name">RuleFinder</div>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<main>
  <div class="chat-page-inner">
    <h1>Ask anything about FINRA's rules.</h1>
    <p class="sub">Answers are pulled directly from FINRA rule text, with citations.</p>

    <div class="chat-window">
      <div class="chat-head">
        <span>RuleFinder</span>
        <span><i class="live-dot"></i>LIVE</span>
      </div>
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Ask about supervision, registration, reporting, sales practice…" autofocus>
        <button id="chatBtn">Ask</button>
      </div>
    </div>
    <div class="hero-hint">No sign-up needed to ask a question.</div>
  </div>
</main>

<script>
(function(){
  const chatBody = document.getElementById('chatBody');
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatBtn');
  let chatHistory = [];

  function addBubble(role, text){
    const div = document.createElement('div');
    div.className = role === 'human' ? 'bubble-q' : 'bubble-a';
    div.textContent = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    return div;
  }

  async function send(){
    const question = input.value.trim();
    if(!question || btn.disabled) return;
    input.value = '';
    btn.disabled = true;
    addBubble('human', question);
    const answerBubble = addBubble('ai', 'Thinking…');

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ question, chat_history: chatHistory })
      });
      const data = await res.json();
      if(!res.ok){
        answerBubble.textContent = data.error || 'Something went wrong. Please try again.';
      } else {
        answerBubble.textContent = data.answer;
        chatHistory = data.chat_history;
      }
    } catch (err) {
      answerBubble.textContent = 'Could not reach the server. Please try again.';
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  btn.addEventListener('click', send);
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter') send();
  });
})();
</script>
</body>
</html>
