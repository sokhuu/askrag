<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brand Name</title>
  <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
  <header>
    <h1>Brand Name</h1>
    <p>Find out how you can comply.</p>
  </header>
  <main>
    <section>
      <h2>Which state are you in?</h2>
      <div class="dropdown">
  <button onclick="myFunction()" class="dropbtn">Select your city</button>
  <div id="myDropdown" class="dropdown-content">
    <a href="#Claremont">California</a>
    <a href="#Orinda">Delaware</a>
    <a href="#Bakersfield">Florida</a>
    <a href="#Bakersfield">Texas</a>
  </div>
</div>

<script>
/* When the user clicks on the button, 
toggle between hiding and showing the dropdown content */
function myFunction() {
  document.getElementById("myDropdown").classList.toggle("show");
}

// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
</script>

    </section>
    <section>
      <h2>Ask Questions</h2>
      <form id="ask-form">
        <input type="text" id="question-input" placeholder="Search..." autocomplete="off">
        <button type="submit" class="dropbtn">Ask</button>
      </form>
      <p id="ask-status"></p>
      <div id="answer-box"></div>
    </section>
  </main>

  <script>
    const askForm = document.getElementById("ask-form");
    const questionInput = document.getElementById("question-input");
    const askStatus = document.getElementById("ask-status");
    const answerBox = document.getElementById("answer-box");
    let chatHistory = [];

    askForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = questionInput.value.trim();
      if (!question) return;

      askStatus.textContent = "Thinking...";
      answerBox.textContent = "";

      try {
        const response = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, chat_history: chatHistory }),
        });

        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }

        const data = await response.json();
        chatHistory = data.chat_history;
        answerBox.textContent = data.answer;
        askStatus.textContent = "";
      } catch (err) {
        askStatus.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
</body>
</html>
